name: Build Manager

on:
  push:
    branches: [ "main", "dev", "ci" ]
    paths:
      - '.github/workflows/build-manager.yml'
      - 'manager/**'
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - '.github/workflows/build-manager.yml'
      - 'manager/**'
  workflow_dispatch:

jobs:
  build-manager:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./manager

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write key
        run: |
            {
              echo KEYSTORE_PASSWORD='A123@abc'
              echo KEY_ALIAS='cam'
              echo KEY_PASSWORD='A123@abc'
              echo KEYSTORE_FILE='dummy.keystore'
            } >> gradle.properties

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create ksud stubs
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/x86_64
          # Create minimal ELF stub for arm64
          printf '\x7fELF' > app/src/main/jniLibs/arm64-v8a/libksud.so
          printf '\x7fELF' > app/src/main/jniLibs/x86_64/libksud.so

      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean assembleRelease

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: manager
          path: manager/app/build/outputs/apk/release/*.apk

      - name: Upload mappings
        uses: actions/upload-artifact@v4
        with:
          name: "mappings"
          path: "manager/app/build/outputs/mapping/release/"

      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        uses: softprops/action-gh-release@v2
        with:
          files: manager/app/build/outputs/apk/release/*.apk
          tag_name: "v${{ github.run_number }}"
          name: "KernelSU Manager LiquidGlass v${{ github.run_number }}"
          body: |
            ## KernelSU Manager - Liquid Glass iOS 26 Edition
            
            **Build:** #${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            
            ### Features
            - 🧊 Liquid Glass transparent surfaces
            - 📱 Dynamic Island toast notifications
            - 🔄 iOS-style slide/fade transitions
            - 🎚️ iOS toggle switches with haptic feedback
            - 🌫️ Enhanced 25dp haze blur
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
