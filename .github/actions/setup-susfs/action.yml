name: 'Setup SUSFS'
description: 'Clone and apply SUSFS patches for root hiding'

inputs:
  android_version:
    description: 'Android version (e.g., android15)'
    required: true
  kernel_version:
    description: 'Kernel version (e.g., 6.6)'
    required: true
  sublevel:
    description: 'Kernel sublevel (e.g., 89)'
    required: true
  susfs_commit:
    description: 'SUSFS commit (optional)'
    required: false

runs:
  using: composite
  steps:
    - name: Clone SUSFS Repository
      shell: bash
      run: |
        SUSFS_BRANCH="gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}"
        SUSFS_REPO="https://gitlab.com/simonpunk/susfs4ksu.git"

        echo "=== Cloning SUSFS (branch: $SUSFS_BRANCH) ==="

        if [ -n "${{ inputs.susfs_commit }}" ]; then
          git clone "$SUSFS_REPO" -b "$SUSFS_BRANCH" "${{ github.workspace }}/susfs4ksu"
          cd "${{ github.workspace }}/susfs4ksu"
          git checkout "${{ inputs.susfs_commit }}"
        else
          git clone "$SUSFS_REPO" -b "$SUSFS_BRANCH" --depth=1 "${{ github.workspace }}/susfs4ksu"
        fi

        SUSFS_VERSION="2.0.0"
        echo "SUSFS_VERSION=$SUSFS_VERSION" >> $GITHUB_ENV
        echo "SUSFS branch: $SUSFS_BRANCH, version: $SUSFS_VERSION"

    - name: Apply SUSFS Source Files to GKI Kernel
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        echo "=== Copying SUSFS source files to GKI kernel ==="

        cp "${{ github.workspace }}/susfs4ksu/kernel_patches/fs/"* \
           "${{ github.workspace }}/kernel/common/fs/"
        cp "${{ github.workspace }}/susfs4ksu/kernel_patches/include/linux/"* \
           "${{ github.workspace }}/kernel/common/include/linux/"

        echo "=== Applying SUSFS GKI kernel patch ==="

        PATCH_FILE="50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch"
        cp "${{ github.workspace }}/susfs4ksu/kernel_patches/${PATCH_FILE}" ./
        patch -p1 < "${PATCH_FILE}" || true

        echo "=== SUSFS GKI patches applied ==="

    - name: Apply SUSFS KernelSU Integration Patch
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        echo "=== Applying SUSFS-KernelSU integration patch ==="
        echo "Working directory: $(pwd)"

        # The 10_enable_susfs_for_ksu.patch uses paths like:
        #   kernel/Kbuild, kernel/core/init.c, kernel/Kconfig, etc.
        # These match THIS REPO's structure (peo1108/sfs),
        # so we apply from $GITHUB_WORKSPACE (repo root) with -p1

        KSU_PATCH=$(find "${{ github.workspace }}/susfs4ksu/kernel_patches" \
          -name "*enable_susfs_for_ksu*" -o -name "*ksu_susfs*" | head -1)

        if [ -n "$KSU_PATCH" ]; then
          echo "Found KSU integration patch: $KSU_PATCH"
          echo "Applying from repo root to match kernel/Kbuild, kernel/core/init.c paths..."
          patch -p1 --no-backup-if-mismatch < "$KSU_PATCH" || true
        else
          echo "⚠️ KSU integration patch not found"
          find "${{ github.workspace }}/susfs4ksu/kernel_patches" -name "*.patch" -type f
        fi

        # Verify Kconfig has SUSFS entries
        KSU_KCONFIG="${{ github.workspace }}/kernel/Kconfig"
        if [ -f "$KSU_KCONFIG" ] && grep -q "KSU_SUSFS" "$KSU_KCONFIG"; then
          echo "✅ SUSFS Kconfig entries found in kernel/Kconfig!"
        else
          echo "⚠️ Patch may have partially failed, adding SUSFS Kconfig entries manually..."
          # Find the correct Kconfig
          if [ -f "$KSU_KCONFIG" ]; then
            TARGET_KC="$KSU_KCONFIG"
          else
            echo "kernel/Kconfig not found, looking for alternatives..."
            TARGET_KC=$(find "${{ github.workspace }}" -path "*/kernelsu/Kconfig" -not -path "*/susfs4ksu/*" | head -1)
          fi

          if [ -n "$TARGET_KC" ] && [ -f "$TARGET_KC" ]; then
            echo "Using Kconfig at: $TARGET_KC"
            if ! grep -q "KSU_SUSFS" "$TARGET_KC"; then
              # Insert SUSFS Kconfig before endmenu
              cat >> "$TARGET_KC" << 'KCONFIG_EOF'

        config KSU_SUSFS
        	bool "KernelSU addon - SUSFS"
        	depends on KSU
        	default y
        	help
        	  Addon root-hiding patch for KernelSU.

        config KSU_SUSFS_SUS_PATH
        	bool "Enable sus_path"
        	depends on KSU_SUSFS
        	default y

        config KSU_SUSFS_SUS_MOUNT
        	bool "Enable sus_mount"
        	depends on KSU_SUSFS
        	default y

        config KSU_SUSFS_SUS_KSTAT
        	bool "Enable sus_kstat"
        	depends on KSU_SUSFS
        	default y

        config KSU_SUSFS_SUS_MAP
        	bool "Enable sus_maps"
        	depends on KSU_SUSFS
        	default y

        config KSU_SUSFS_SPOOF_UNAME
        	bool "Enable uname spoofing"
        	depends on KSU_SUSFS
        	default y

        config KSU_SUSFS_ENABLE_LOG
        	bool "Enable logging"
        	depends on KSU_SUSFS
        	default y

        config KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS
        	bool "Hide KSU and SUSFS symbols"
        	depends on KSU_SUSFS
        	default y

        config KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG
        	bool "Spoof cmdline or bootconfig"
        	depends on KSU_SUSFS
        	default y

        config KSU_SUSFS_OPEN_REDIRECT
        	bool "Enable open redirect"
        	depends on KSU_SUSFS
        	default y
        KCONFIG_EOF
              echo "✅ SUSFS Kconfig entries added manually to $TARGET_KC"
            fi
          else
            echo "❌ No suitable Kconfig found!"
          fi
        fi

        echo ""
        echo "=== Verify SUSFS integration ==="
        echo "--- kernel/Kconfig tail ---"
        tail -20 "${{ github.workspace }}/kernel/Kconfig" 2>/dev/null || echo "N/A"

    - name: Apply SUSFS Sublevel Fixes
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        SUBLEVEL=${{ inputs.sublevel }}
        SUSFS_VERSION=${{ env.SUSFS_VERSION }}

        echo "=== Checking sublevel fixes (sublevel=$SUBLEVEL) ==="

        if [[ "${{ inputs.android_version }}" == "android15" && "${{ inputs.kernel_version }}" == "6.6" ]]; then
          if [[ "$SUBLEVEL" -le 92 ]]; then
            PATCH="${{ github.workspace }}/kernel_patches/wild/susfs_fix_patches/v${SUSFS_VERSION}/a15-6.6/base.c.patch"
            if [ -f "$PATCH" ]; then
              echo "Applying base.c fix for sublevel <= 92"
              cp "$PATCH" ./
              patch -p1 < base.c.patch || true
            fi
          fi

          if [[ "$SUBLEVEL" -le 58 ]]; then
            PATCH="${{ github.workspace }}/kernel_patches/wild/susfs_fix_patches/v${SUSFS_VERSION}/a15-6.6/task_mmu.c.patch"
            if [ -f "$PATCH" ]; then
              echo "Applying task_mmu.c fix for sublevel <= 58"
              cp "$PATCH" ./
              patch -p1 < task_mmu.c.patch || true
            fi
          fi
        fi

    - name: Enable SUSFS Config
      shell: bash
      run: |
        cat >> "${{ github.workspace }}/gki.fragment" << 'EOF'
        CONFIG_KSU_SUSFS=y
        CONFIG_KSU_SUSFS_SUS_PATH=y
        CONFIG_KSU_SUSFS_SUS_MOUNT=y
        CONFIG_KSU_SUSFS_SUS_KSTAT=y
        CONFIG_KSU_SUSFS_SPOOF_UNAME=y
        CONFIG_KSU_SUSFS_ENABLE_LOG=y
        CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
        CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
        CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
        CONFIG_KSU_SUSFS_SUS_MAP=y
        EOF
        echo "=== SUSFS config fragment added ==="
