name: 'Setup SUSFS'
description: 'Clone and apply SUSFS patches for root hiding'

inputs:
  android_version:
    description: 'Android version (e.g., android15)'
    required: true
  kernel_version:
    description: 'Kernel version (e.g., 6.6)'
    required: true
  sublevel:
    description: 'Kernel sublevel (e.g., 89)'
    required: true
  susfs_commit:
    description: 'SUSFS commit (optional)'
    required: false

runs:
  using: composite
  steps:
    - name: Clone SUSFS Repository
      shell: bash
      run: |
        SUSFS_BRANCH="gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}"
        SUSFS_REPO="https://gitlab.com/simonpunk/susfs4ksu.git"

        echo "=== Cloning SUSFS (branch: $SUSFS_BRANCH) ==="

        if [ -n "${{ inputs.susfs_commit }}" ]; then
          git clone "$SUSFS_REPO" -b "$SUSFS_BRANCH" "${{ github.workspace }}/susfs4ksu"
          cd "${{ github.workspace }}/susfs4ksu"
          git checkout "${{ inputs.susfs_commit }}"
        else
          git clone "$SUSFS_REPO" -b "$SUSFS_BRANCH" --depth=1 "${{ github.workspace }}/susfs4ksu"
        fi

        SUSFS_VERSION="2.0.0"
        echo "SUSFS_VERSION=$SUSFS_VERSION" >> $GITHUB_ENV
        echo "SUSFS branch: $SUSFS_BRANCH, version: $SUSFS_VERSION"

    - name: Apply SUSFS Source Files to Kernel
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        echo "=== Copying SUSFS source files ==="

        # Copy SUSFS kernel source files
        cp "${{ github.workspace }}/susfs4ksu/kernel_patches/fs/"* \
           "${{ github.workspace }}/kernel/common/fs/"
        cp "${{ github.workspace }}/susfs4ksu/kernel_patches/include/linux/"* \
           "${{ github.workspace }}/kernel/common/include/linux/"

        echo "=== Applying SUSFS GKI kernel patch ==="

        # Apply the GKI-specific SUSFS patch (adds susfs to kernel build system)
        PATCH_FILE="50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch"
        cp "${{ github.workspace }}/susfs4ksu/kernel_patches/${PATCH_FILE}" ./
        patch -p1 < "${PATCH_FILE}" || true

        echo "=== SUSFS GKI patches applied ==="

    - name: Apply SUSFS KernelSU Integration Patch
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        echo "=== Applying SUSFS-KernelSU integration patch ==="

        # This patch adds CONFIG_KSU_SUSFS* Kconfig entries to KernelSU's Kconfig
        # and integrates SUSFS hooks into KernelSU source code
        KSU_PATCH=$(find "${{ github.workspace }}/susfs4ksu/kernel_patches" -name "*enable_susfs_for_ksu*" -o -name "*ksu_susfs*" | head -1)

        if [ -n "$KSU_PATCH" ]; then
          echo "Found KSU integration patch: $KSU_PATCH"
          cp "$KSU_PATCH" ./
          patch -p1 < "$(basename "$KSU_PATCH")" || true
        else
          echo "KSU integration patch not found in susfs4ksu repo"
          echo "Listing available patches:"
          find "${{ github.workspace }}/susfs4ksu/kernel_patches" -name "*.patch" -type f
          echo ""
          echo "Attempting to apply all numbered patches..."
          for p in "${{ github.workspace }}/susfs4ksu/kernel_patches/"*.patch; do
            if [ -f "$p" ] && [[ "$(basename "$p")" != 50_* ]]; then
              echo "Applying: $(basename "$p")"
              cp "$p" ./
              patch -p1 < "$(basename "$p")" || true
            fi
          done
        fi

        # Verify Kconfig entries exist
        KSU_KCONFIG=$(find . -path "*/kernelsu/Kconfig" -o -path "*/KernelSU/kernel/Kconfig" | head -1)
        if [ -n "$KSU_KCONFIG" ]; then
          echo "=== KernelSU Kconfig contents ==="
          cat "$KSU_KCONFIG"
          if grep -q "KSU_SUSFS" "$KSU_KCONFIG"; then
            echo "✅ SUSFS Kconfig entries found!"
          else
            echo "⚠️ SUSFS Kconfig entries NOT found, adding manually..."
            # Manually add SUSFS Kconfig entries before endmenu
            sed -i '/^endmenu/i \
        config KSU_SUSFS\n\tbool "KernelSU addon - SUSFS"\n\tdepends on KSU\n\tdefault y\n\thelp\n\t  Addon patch for KernelSU to enable SUSFS.\n\
        config KSU_SUSFS_SUS_PATH\n\tbool "SUSFS - Enable sus_path"\n\tdepends on KSU_SUSFS\n\tdefault y\n\
        config KSU_SUSFS_SUS_MOUNT\n\tbool "SUSFS - Enable sus_mount"\n\tdepends on KSU_SUSFS\n\tdefault y\n\
        config KSU_SUSFS_SUS_KSTAT\n\tbool "SUSFS - Enable sus_kstat"\n\tdepends on KSU_SUSFS\n\tdefault y\n\
        config KSU_SUSFS_SUS_MAP\n\tbool "SUSFS - Enable sus_maps"\n\tdepends on KSU_SUSFS\n\tdefault y\n\
        config KSU_SUSFS_SPOOF_UNAME\n\tbool "SUSFS - Enable uname spoofing"\n\tdepends on KSU_SUSFS\n\tdefault y\n\
        config KSU_SUSFS_ENABLE_LOG\n\tbool "SUSFS - Enable logging"\n\tdepends on KSU_SUSFS\n\tdefault y\n\
        config KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS\n\tbool "SUSFS - Hide KSU and SUSFS symbols"\n\tdepends on KSU_SUSFS\n\tdefault y\n\
        config KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG\n\tbool "SUSFS - Spoof cmdline or bootconfig"\n\tdepends on KSU_SUSFS\n\tdefault y\n\
        config KSU_SUSFS_OPEN_REDIRECT\n\tbool "SUSFS - Enable open redirect"\n\tdepends on KSU_SUSFS\n\tdefault y\n' "$KSU_KCONFIG"
            echo "=== Updated Kconfig ==="
            cat "$KSU_KCONFIG"
          fi
        else
          echo "❌ KernelSU Kconfig not found!"
          find . -name "Kconfig" | head -20
        fi

    - name: Apply SUSFS Sublevel Fixes
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        SUBLEVEL=${{ inputs.sublevel }}
        SUSFS_VERSION=${{ env.SUSFS_VERSION }}

        echo "=== Checking sublevel fixes (sublevel=$SUBLEVEL) ==="

        if [[ "${{ inputs.android_version }}" == "android15" && "${{ inputs.kernel_version }}" == "6.6" ]]; then
          if [[ "$SUBLEVEL" -le 92 ]]; then
            if [ -f "${{ github.workspace }}/kernel_patches/wild/susfs_fix_patches/v${SUSFS_VERSION}/a15-6.6/base.c.patch" ]; then
              echo "Applying base.c fix for sublevel <= 92"
              cp "${{ github.workspace }}/kernel_patches/wild/susfs_fix_patches/v${SUSFS_VERSION}/a15-6.6/base.c.patch" ./
              patch -p1 < base.c.patch || true
            fi
          fi

          if [[ "$SUBLEVEL" -le 58 ]]; then
            if [ -f "${{ github.workspace }}/kernel_patches/wild/susfs_fix_patches/v${SUSFS_VERSION}/a15-6.6/task_mmu.c.patch" ]; then
              echo "Applying task_mmu.c fix for sublevel <= 58"
              cp "${{ github.workspace }}/kernel_patches/wild/susfs_fix_patches/v${SUSFS_VERSION}/a15-6.6/task_mmu.c.patch" ./
              patch -p1 < task_mmu.c.patch || true
            fi
          fi
        fi

    - name: Enable SUSFS Config
      shell: bash
      run: |
        cat >> "${{ github.workspace }}/gki.fragment" << 'EOF'
        # SUSFS Configuration
        CONFIG_KSU_SUSFS=y
        CONFIG_KSU_SUSFS_SUS_PATH=y
        CONFIG_KSU_SUSFS_SUS_MOUNT=y
        CONFIG_KSU_SUSFS_SUS_KSTAT=y
        CONFIG_KSU_SUSFS_SPOOF_UNAME=y
        CONFIG_KSU_SUSFS_ENABLE_LOG=y
        CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
        CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
        CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
        CONFIG_KSU_SUSFS_SUS_MAP=y
        EOF
        echo "=== SUSFS config fragment added ==="
