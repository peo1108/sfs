name: 'Setup KernelSU'
description: 'Integrate KernelSU into the GKI kernel source tree'

inputs:
  ksu_commit:
    description: 'KernelSU commit or tag (optional, defaults to latest tag)'
    required: false
    type: string

runs:
  using: composite
  steps:
    - name: Download and Setup KernelSU
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        echo "=== Setting up KernelSU ==="

        # Use setup.sh from this repository's kernel/ directory
        KSU_SETUP="${{ github.workspace }}/kernel/setup.sh"

        if [ -f "$KSU_SETUP" ]; then
          echo "Using local setup.sh from repository"
          chmod +x "$KSU_SETUP"
          cd common
          bash "$KSU_SETUP" ${{ inputs.ksu_commit }}
          cd ..
        else
          echo "Downloading setup.sh from repository"
          cd common
          curl -LSs "https://raw.githubusercontent.com/${{ github.repository }}/main/kernel/setup.sh" | bash -s ${{ inputs.ksu_commit }}
          cd ..
        fi

    - name: Fix uapi Include Path
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        echo "=== Fixing uapi include path ==="

        # Find the KernelSU root directory (where uapi/ lives)
        KSU_ROOT=""
        if [ -d "KernelSU" ]; then
          KSU_ROOT="KernelSU"
        elif [ -d "${{ github.workspace }}/kernel/KernelSU" ]; then
          KSU_ROOT="${{ github.workspace }}/kernel/KernelSU"
        fi

        # Find the kernelsu driver directory (symlink target)
        KSU_DRIVER=""
        if [ -L "drivers/kernelsu" ]; then
          KSU_DRIVER="drivers/kernelsu"
        fi

        if [ -n "$KSU_ROOT" ] && [ -n "$KSU_DRIVER" ]; then
          # The uapi/ directory is at KernelSU/uapi/ (root level)
          # but the symlink points to KernelSU/kernel/ only
          # We need uapi/ accessible from within the kernel module dir
          UAPI_SRC="$KSU_ROOT/uapi"
          if [ -d "$UAPI_SRC" ]; then
            # Create symlink: drivers/kernelsu/uapi -> ../../KernelSU/uapi
            UAPI_REL=$(realpath --relative-to="$KSU_DRIVER" "$UAPI_SRC")
            ln -sf "$UAPI_REL" "$KSU_DRIVER/uapi"
            echo "✅ Created uapi symlink: $KSU_DRIVER/uapi -> $UAPI_REL"
            ls -la "$KSU_DRIVER/uapi/"
          else
            echo "⚠️ uapi/ not found at $UAPI_SRC"
            echo "Looking for uapi directory..."
            find . -name "uapi" -type d 2>/dev/null | head -10
            find "$KSU_ROOT" -name "app_profile.h" -type f 2>/dev/null | head -10
          fi
        else
          echo "⚠️ KernelSU setup not detected properly"
          echo "KSU_ROOT=$KSU_ROOT KSU_DRIVER=$KSU_DRIVER"
          find . -name "kernelsu" -type l 2>/dev/null | head -5
          find . -name "KernelSU" -type d -maxdepth 2 2>/dev/null | head -5
        fi

    - name: Enable KernelSU Config
      shell: bash
      run: |
        cat >> "${{ github.workspace }}/gki.fragment" << 'EOF'
        CONFIG_KSU=y
        EOF

    - name: Extract KSU Version Info
      shell: bash
      run: |
        KSU_DIR=""
        if [ -d "${{ github.workspace }}/kernel/common/KernelSU" ]; then
          KSU_DIR="${{ github.workspace }}/kernel/common/KernelSU"
        elif [ -d "${{ github.workspace }}/kernel/KernelSU" ]; then
          KSU_DIR="${{ github.workspace }}/kernel/KernelSU"
        fi

        if [ -n "$KSU_DIR" ]; then
          cd "$KSU_DIR"
          KSU_GIT_VERSION=$(git rev-list --count HEAD 2>/dev/null || echo "0")
          KSU_GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "unknown")
          KSU_COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          KSU_VERSION=$((30000 + KSU_GIT_VERSION))

          echo "KSU Version: $KSU_VERSION (tag: $KSU_GIT_TAG, commit: $KSU_COMMIT)"
          echo "KSU_GIT_TAG=$KSU_GIT_TAG" >> $GITHUB_ENV
          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
          echo "KSU_COMMIT=$KSU_COMMIT" >> $GITHUB_ENV
        else
          echo "⚠️ KernelSU directory not found"
        fi
