name: 'Download Kernel Repository'
description: 'Initialize and sync Android GKI kernel source repository with caching'

inputs:
  android_version:
    description: 'Android version (e.g., android15)'
    required: true
  kernel_version:
    description: 'Kernel version (e.g., 6.6)'
    required: true
  os_patch_level:
    description: 'OS patch level (e.g., 2025-06)'
    required: true

outputs:
  deprecated_branch:
    description: 'Whether the branch is deprecated'
    value: ${{ steps.sync.outputs.deprecated }}
  cache_hit:
    description: 'Whether kernel source was restored from cache'
    value: ${{ steps.cache.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Calculate Cache Key
      id: cache-key
      shell: bash
      run: |
        BRANCH="common-${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.os_patch_level }}"
        echo "cache_key=gki-kernel-${BRANCH}" >> $GITHUB_OUTPUT
        echo "Cache key: gki-kernel-${BRANCH}"

    - name: Restore Kernel Source from Cache
      id: cache
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/kernel
        key: ${{ steps.cache-key.outputs.cache_key }}
        restore-keys: |
          gki-kernel-common-${{ inputs.android_version }}-${{ inputs.kernel_version }}-

    - name: Initialize and Sync Kernel Repository
      id: sync
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        FORMATTED_BRANCH="${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.os_patch_level }}"

        echo "=== Cache MISS - Downloading kernel source ==="
        echo "=== Initializing repo for branch: common-${FORMATTED_BRANCH} ==="

        # Initialize repo with the target branch
        repo init -u https://android.googlesource.com/kernel/manifest \
          -b common-${FORMATTED_BRANCH} --depth=1

        # Check if branch is deprecated
        REMOTE_BRANCH=$(git ls-remote https://android.googlesource.com/kernel/common ${FORMATTED_BRANCH})
        DEFAULT_MANIFEST_PATH=.repo/manifests/default.xml
        DEPRECATED=false

        if grep -q deprecated <<< $REMOTE_BRANCH; then
          sed -i "s/\"${FORMATTED_BRANCH}\"/\"deprecated\/${FORMATTED_BRANCH}\"/g" $DEFAULT_MANIFEST_PATH
          echo "⚠ Note: Branch ${FORMATTED_BRANCH} is deprecated."
          DEPRECATED=true
        fi

        echo "deprecated=$DEPRECATED" >> $GITHUB_OUTPUT

        # Sync kernel source
        echo "=== Syncing kernel source (this may take 10-20 minutes) ==="
        repo --trace sync -c -j$(nproc --all) --fail-fast --no-tags --force-sync --no-clone-bundle
        echo "=== Kernel source synced and will be cached for future builds ==="

    - name: Report Cache Status
      if: steps.cache.outputs.cache-hit == 'true'
      shell: bash
      run: |
        echo "=== Cache HIT - Kernel source restored from cache! ==="
        echo "=== Skipping repo sync, saving ~10-20 minutes ==="
        ls -la "${{ github.workspace }}/kernel/common/" | head -20
